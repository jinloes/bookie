# Use in-memory H2 so tests are isolated from the real database file
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop

# Dummy values to satisfy MSAL4J constructor validation (no network calls are made)
outlook.client-id=test-client-id
outlook.client-secret=test-client-secret
outlook.tenant-id=test-tenant-id
outlook.redirect-uri=http://localhost:48763/api/outlook/callback

# Dummy values for AI service
ai.provider=copilot
ai.auth.token=test-key
ai.model.agent=test-agent-model
ai.model.chat=test-model
ai.model.vision=test-vision-model
spring.autoconfigure.exclude=\
  org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

cors.allowed-origins=http://localhost:5173
