spring.application.name=bookie
spring.config.import=optional:file:.env.local.properties

# H2 Database
spring.datasource.url=jdbc:h2:file:${user.home}/.bookie/bookiedb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
# Disabled so lazy-load bugs surface deterministically inside service @Transactional boundaries
# rather than as flaky 500s during JSON serialization.
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway owns the schema. baseline-on-migrate lets existing H2 databases (created by
# ddl-auto=update before Flyway was introduced) skip V1 and pick up at V2.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Server
server.port=48763
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.task.execution.shutdown.await-termination=true
spring.task.execution.shutdown.await-termination-period=10s

# CORS — includes Vite dev server, Tauri macOS (tauri://), and Tauri Windows (https://tauri.localhost)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,tauri://localhost,https://tauri.localhost}

# Logging
logging.level.com.bookie.service.EmailParserService=DEBUG
logging.level.com.bookie.service.EmailParserTools=DEBUG
logging.level.com.bookie.service.OutlookService=DEBUG
logging.level.org.springframework.web.client=DEBUG

# Resilience4j circuit breaker for AI-backed email parser requests
resilience4j.circuitbreaker.instances.aiClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.aiClient.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.aiClient.sliding-window-size=6
resilience4j.circuitbreaker.instances.aiClient.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.aiClient.permitted-number-of-calls-in-half-open-state=2

# AI service
ai.provider=${AI_PROVIDER:copilot}
# Exclude Spring AI OpenAI autoconfiguration by default so Copilot remains zero-config.
# When switching to ai.provider=spring-ai, provide spring.ai.openai.api-key and override
# spring.autoconfigure.exclude for the OpenAI auto-config classes you want enabled.
spring.autoconfigure.exclude=\
  org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
ai.cli.path=${AI_CLI_PATH:${COPILOT_CLI_PATH:}}
ai.auth.token=${AI_AUTH_TOKEN:${GITHUB_TOKEN:}}
ai.auth.use-logged-in-user=${AI_USE_LOGGED_IN_USER:${COPILOT_USE_LOGGED_IN_USER:true}}
ai.model.agent=${AI_MODEL_AGENT:${COPILOT_AGENT_MODEL:gpt-5-mini}}
ai.model.chat=${AI_MODEL_CHAT:${COPILOT_CHAT_MODEL:gpt-5-mini}}
ai.model.vision=${AI_MODEL_VISION:${COPILOT_VISION_MODEL:gpt-5-mini}}
ai.tools.email-parser.enabled=${AI_TOOLS_EMAIL_PARSER_ENABLED:false}
ai.tools.trace-events=${AI_TOOLS_TRACE_EVENTS:false}
ai.request-timeout-ms=${AI_REQUEST_TIMEOUT_MS:${COPILOT_REQUEST_TIMEOUT_MS:180000}}

# Outlook / Microsoft Graph
outlook.client-id=${OUTLOOK_CLIENT_ID:}
outlook.client-secret=${OUTLOOK_CLIENT_SECRET:}
outlook.tenant-id=${OUTLOOK_TENANT_ID:}
outlook.redirect-uri=${OUTLOOK_REDIRECT_URI:http://localhost:48763/api/outlook/callback}
