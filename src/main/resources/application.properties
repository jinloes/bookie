spring.application.name=bookie

# H2 Database
spring.datasource.url=jdbc:h2:file:${user.home}/.bookie/bookiedb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
# Disabled so lazy-load bugs surface deterministically inside service @Transactional boundaries
# rather than as flaky 500s during JSON serialization.
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway owns the schema. baseline-on-migrate lets existing H2 databases (created by
# ddl-auto=update before Flyway was introduced) skip V1 and pick up at V2.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Server
server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.task.execution.shutdown.await-termination=true
spring.task.execution.shutdown.await-termination-period=10s

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.bookie.service.EmailParserService=DEBUG
logging.level.com.bookie.service.EmailParserTools=DEBUG
logging.level.com.bookie.service.OutlookService=DEBUG
logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor=DEBUG
logging.level.org.springframework.web.client=DEBUG

# Resilience4j circuit breaker for local LLM client (email parser)
resilience4j.circuitbreaker.instances.ollamaClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ollamaClient.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.ollamaClient.sliding-window-size=6
resilience4j.circuitbreaker.instances.ollamaClient.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.ollamaClient.permitted-number-of-calls-in-half-open-state=2

# Anthropic API Key
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Spring AI - LM Studio (OpenAI-compatible API)
spring.ai.openai.base-url=${LM_STUDIO_BASE_URL:http://localhost:1234}
spring.ai.openai.api-key=${LM_STUDIO_API_KEY:lm-studio}
spring.ai.openai.chat.options.model=${LM_STUDIO_MODEL:qwen/qwen3.6-35b-a3b}
spring.ai.openai.ocr.model=${LM_STUDIO_VISION_MODEL:qwen/qwen3.6-35b-a3b}
spring.ai.openai.client.read-timeout=PT3M
# Disable Spring AI's internal retry — defaults to 10 attempts, which with LM Studio's JIT model
# loading turns one slow first-token request into N parallel model loads. We already have
# @Retryable + @CircuitBreaker on the user-facing call paths.
spring.ai.retry.max-attempts=1
lm.studio.parallelism=${LM_STUDIO_PARALLELISM:1}

# Outlook / Microsoft Graph
outlook.client-id=${OUTLOOK_CLIENT_ID:}
outlook.client-secret=${OUTLOOK_CLIENT_SECRET:}
outlook.tenant-id=${OUTLOOK_TENANT_ID:}
outlook.redirect-uri=${OUTLOOK_REDIRECT_URI:http://localhost:8080/api/outlook/callback}
