spring.application.name=bookie

# H2 Database
spring.datasource.url=jdbc:h2:file:${user.home}/.bookie/bookiedb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.task.execution.shutdown.await-termination=true
spring.task.execution.shutdown.await-termination-period=10s

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.bookie.service.EmailParserService=DEBUG
logging.level.com.bookie.service.EmailParserTools=DEBUG
logging.level.com.bookie.service.OutlookService=DEBUG
logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor=DEBUG
logging.level.org.springframework.web.client=TRACE

# Anthropic API Key
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Spring AI - Ollama
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${OLLAMA_MODEL:gpt-oss:20b}
spring.ai.ollama.ocr.model=${OLLAMA_VISION_MODEL:glm-ocr}
spring.ai.ollama.client.read-timeout=PT3M

# Outlook / Microsoft Graph
outlook.client-id=${OUTLOOK_CLIENT_ID:}
outlook.client-secret=${OUTLOOK_CLIENT_SECRET:}
outlook.tenant-id=${OUTLOOK_TENANT_ID:}
outlook.redirect-uri=${OUTLOOK_REDIRECT_URI:http://localhost:8080/api/outlook/callback}
